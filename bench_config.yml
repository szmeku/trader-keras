# Benchmark config — matching trader-t5x for throughput comparison
# 6 features, 200k rows, same model/batch/lookback
stage1:
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  lookback: 60
  horizons: 10
  bar_seconds: 60
  stride: 1
  epochs: 5
  patience: 99
  batch_size: 1024
  lr: 0.0003
  weight_decay: 0.0
  clip_grad_norm: 1.0
  train_ratio: 0.8
  probabilistic: true
  seed: 42
  features:
    - log_returns
    - high
    - low
    - volume
    - log_volume
    - log_volatility

data:
  pattern: "bench_eurusd_200k_1m.parquet"
  data_dir: "~/projects/data"
  load_limit: null

logging:
  provider: console
  project: "trader-keras"

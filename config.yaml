# trader-keras Stage 1 config
# Override any param: python run.py stage1.lr=0.001 data.load_limit=50000

hydra:
  job:
    chdir: false  # don't change working directory

stage1:
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  lookback: 60
  horizons: [10]
  bar_seconds: 60
  stride: 1
  epochs: 100
  patience: 10
  batch_size: 1024
  lr: 0.0003
  weight_decay: 0.0
  clip_grad_norm: 1.0
  train_ratio: 0.8
  probabilistic: true
  magnitude_alpha: 0.0
  seed: -1              # -1 = no seed

data:
  pattern: "icmarkets_eurusd_*_1m.parquet"
  data_dir: "~/projects/data"
  load_limit: 0         # 0 = load everything; set e.g. 50000 for quick tests

logging:
  provider: [console]   # [wandb], [console], or [wandb, console]
  tags: []
  project: "trader-keras"

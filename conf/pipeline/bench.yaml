# @package _global_
# Benchmark config — matching trader-t5x for throughput comparison
pipeline:
  name: predict
  steps: [load, featurize, window, model, checkpoint, fit_supervised, save]
  skip: []

data:
  pattern: "bench_eurusd_200k_1m.parquet"

train:
  horizons: [10]
  epochs: 5
  patience: 99
  batch_size: 1024
  lr: 0.0003
  weight_decay: 0.0
  clip_grad_norm: 1.0
  train_ratio: 0.8
  loss: "gaussian_nll"

# @package _global_
pipeline:
  name: rl
  steps: [env, fit_rl, save]
  skip: []

env:
  symbol: "EURUSD"
  date_start: "2024-01-01"
  date_end: "2024-12-31"
  lookback: 1          # streaming GRU — one bar at a time, hidden carries context
  balance: 10000.0
  leverage: 20.0

rl:
  n_epochs: 4
  clip_epsilon: 0.2
  entropy_coeff: 0.01
  value_coeff: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  lr: 0.0003
  clip_grad_norm: 1.0

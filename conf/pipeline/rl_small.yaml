# @package _global_
# Small RL config for quick testing / smoke runs.
# One asset, one sequential pass through the date range per epoch.
pipeline:
  name: rl
  steps: [env, fit_rl, save]
  skip: []

env:
  symbol: "BTCUSD"
  date_start: "2025-01-01"
  date_end: "2025-01-03"
  lookback: 1          # streaming GRU — one bar at a time, hidden carries context
  balance: 10000.0
  leverage: 20.0

backbone:
  hidden_size: 40

rl:
  n_epochs: 8         #full sequential passes over the date range
  clip_epsilon: 0.2
  entropy_coeff: 0.0000001
  value_coeff: 0.5
  gamma: 0.95
  gae_lambda: 0.95
  lr: 0.001
  clip_grad_norm: 1.0
  tbptt_chunk: 256
  reward:
    type: pbrs
    alpha: 1.0

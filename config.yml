# trader-keras Stage 1 config
# See trader_keras/config.py for all options

stage1:
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  lookback: 60           # bars (at bar_seconds=1 → 60s context)
  horizons: 10   # bars ahead to predict
  bar_seconds: 60
  stride: 1
  epochs: 100
  patience: 10
  batch_size: 1024
  lr: 0.0003       # Note: use decimal, not 3e-4 (YAML parses sci notation as string)
  weight_decay: 0.0
  clip_grad_norm: 1.0
  train_ratio: 0.8
  probabilistic: true    # Gaussian NLL with (mu, sigma)
  magnitude_alpha: 0.0
  seed: null

data:
  pattern: "icmarkets_eurusd_*_1m.parquet"
  data_dir: "~/projects/data"
  load_limit: null       # null = load everything; set e.g. 50000 for quick tests

logging:
  provider: console      # "wandb", "console", or [wandb, console]
  tags: []
  project: "trader-keras"
